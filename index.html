<!DOCTYPE html>
<html lang="ru" data-theme="auto">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Погода</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>

  <div class="app-shell">

    <!-- Фоновая атмосфера -->
    <div class="atmosphere" id="atmosphere">
      <div class="atmosphere__orb atmosphere__orb--1"></div>
      <div class="atmosphere__orb atmosphere__orb--2"></div>
      <div class="atmosphere__orb atmosphere__orb--3"></div>
      <div class="atmosphere__grain"></div>
    </div>

    <!-- Шапка -->
    <header class="header">
      <div class="header__left">
        <span class="header__logo">&#9728;</span>
        <span class="header__brand">Погода</span>
      </div>
      <div class="header__right">
        <button class="theme-toggle" id="themeToggle" title="Переключить тему">
          <span class="theme-toggle__icon" id="themeIcon">☀</span>
        </button>
      </div>
    </header>

    <!-- Поиск -->
    <section class="search-section">
      <div class="search-wrapper">
        <div class="search-box">
          <input
            class="search-input"
            id="searchInput"
            type="text"
            placeholder="Введите город..."
            autocomplete="off"
            spellcheck="false"
          />
          <button class="search-btn search-btn--geo" id="geoBtn" title="Моё местоположение">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
            </svg>
          </button>
        </div>
        <ul class="search-suggestions" id="searchSuggestions"></ul>
      </div>
    </section>

    <!-- Основной контент -->
    <main class="main-content" id="mainContent">

      <!-- Состояние загрузки -->
      <div class="state-loading hidden" id="stateLoading">
        <div class="loader">
          <div class="loader__ring"></div>
          <p class="loader__text">Получаем погоду...</p>
        </div>
      </div>

      <!-- Состояние ошибки -->
      <div class="state-error hidden" id="stateError">
        <p class="state-error__icon">⚠</p>
        <p class="state-error__text" id="stateErrorText">Что-то пошло не так</p>
      </div>

      <!-- Состояние приветствия -->
      <div class="state-welcome" id="stateWelcome">
        <p class="state-welcome__hint">Введите город или используйте геолокацию</p>
      </div>

      <!-- Погода -->
      <div class="weather-content hidden" id="weatherContent">

        <!-- Текущая погода -->
        <section class="current-weather" id="currentWeather"></section>

        <!-- Переключатель вкладок -->
        <nav class="tabs" id="tabs">
          <button class="tab tab--active" data-tab="today">Сегодня</button>
          <button class="tab" data-tab="week">Неделя</button>
          <button class="tab" data-tab="month">2 недели</button>
          <button class="tab" data-tab="map" style="display:none">Карта</button>
        </nav>

        <!-- Детали дня -->
        <section class="tab-panel" id="panelToday"></section>

        <!-- Прогноз на неделю -->
        <section class="tab-panel hidden" id="panelWeek"></section>

        <!-- Прогноз на месяц -->
        <section class="tab-panel hidden" id="panelMonth"></section>

        <!-- Карта -->
        <section class="tab-panel hidden" id="panelMap"></section>

      </div>
    </main>

  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
